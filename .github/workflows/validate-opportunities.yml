name: Validate opportunities and portfolio

on:
  pull_request:
    paths:
      - "opportunities/**"
      - "portfolio/**"
      - "scripts/validate_opportunities.py"
      - ".github/workflows/validate-opportunities.yml"
  push:
    branches:
      - master
    paths:
      - "opportunities/**"
      - "portfolio/**"
      - "scripts/validate_opportunities.py"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run opportunity and portfolio validation
        run: python scripts/validate_opportunities.py
